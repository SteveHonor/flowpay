services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flowpay
      POSTGRES_PASSWORD: flowpay
      POSTGRES_DB: flowpay
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowpay -d flowpay"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  api:
    build: ./backend
    environment:
      DATABASE_URL: "postgres://flowpay:flowpay@postgres:5432/flowpay?sslmode=disable"
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  web:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "3000:80"
